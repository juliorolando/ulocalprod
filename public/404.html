<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada — Ushuaia Local</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <style>
    .page-404 {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 1.5rem 5rem;
      min-height: 50vh;
    }
    .page-404__num {
      font-family: var(--font-head);
      font-size: clamp(6rem, 22vw, 11rem);
      font-weight: 700;
      color: var(--primary);
      line-height: 1;
      opacity: 0.12;
      user-select: none;
      letter-spacing: -0.02em;
    }
    .page-404__icon {
      font-size: 3rem;
      margin-top: -3rem;
      filter: drop-shadow(0 2px 6px rgba(44,36,22,0.12));
    }
    .page-404__title {
      font-family: var(--font-head);
      font-size: clamp(1.5rem, 4vw, 2rem);
      color: var(--text);
      margin-top: 1.25rem;
    }
    .page-404__sub {
      color: var(--text-sub);
      font-size: 0.97rem;
      max-width: 380px;
      margin-top: 0.6rem;
      line-height: 1.65;
    }
    .page-404__btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 2rem;
      padding: 0.72rem 1.7rem;
      background: var(--primary);
      color: #fff;
      border-radius: var(--radius-pill);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      transition: background var(--transition), transform var(--transition);
    }
    .page-404__btn:hover  { background: var(--primary-dk); transform: translateY(-1px); }
    .page-404__btn:active { transform: translateY(0); }
  </style>
</head>
<body>

  <div class="sticky-header">
    <header class="hero">
      <div class="hero-inner">
        <a href="/" class="brand">
          <div class="logo-mark">UL</div>
          <span class="brand-name">Ushuaia Local</span>
        </a>
      </div>
    </header>
  </div>

  <div class="page-404">
    <div class="page-404__num">404</div>
    <div class="page-404__icon">🧭</div>
    <h1 class="page-404__title">Página no encontrada</h1>
    <p class="page-404__sub">Este rincón del fin del mundo no existe (todavía). El enlace puede haber cambiado o sido removido.</p>
    <a href="/" class="page-404__btn">← Volver al inicio</a>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <div class="logo-mark footer-logo-mark">UL</div>
        <span class="footer-title">UshuaiaLocal</span>
      </div>
      <p class="footer-copy">&copy; 2026 Todos los derechos reservados.
        <br> Hecho con ❄️ desde el Fin del Mundo.</p>
    </div>
  </footer>

</body>
</html>
